<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frases Aleatorias</title>
    <link rel="stylesheet" href="/styles/frases.css">
</head>
<body>
    <h1>Generador de Frases Aleatorias</h1>
    <p>Haz clic en el botón para obtener una frase inspiradora.</p>
    <button id="generar-frase">Generar Frase</button>
    <div id="frase-container" style="display: none;">
        <blockquote id="frase-texto"></blockquote>
    </div>

    <nav>
        <a href="/">Inicio</a> |
        <a href="/acerca">Acerca de</a> |
        <a href="/contacto">Contacto</a> |
        <a href="/encuesta">Encuesta</a> |
        <a href="/mensajes">Mensajes</a> |
        <a href="/productos">Productos</a>
    </nav>

    <script>
        // Función para obtener y mostrar una frase aleatoria
        async function obtenerFrase() {
            try {
                const response = await fetch('/frase');
                if (!response.ok) {
                    throw new Error('Error al obtener la frase');
                }
                const data = await response.json();
                mostrarFrase(data.frase);
            } catch (error) {
                mostrarFrase('Error: ' + error.message);
            }
        }

        // Función para mostrar la frase en la página
        function mostrarFrase(frase) {
            const container = document.getElementById('frase-container');
            const texto = document.getElementById('frase-texto');
            texto.textContent = frase;
            container.style.display = 'block';
        }

        // Asignar evento al botón
        document.getElementById('generar-frase').addEventListener('click', obtenerFrase);
    </script>
</body>
</html>
