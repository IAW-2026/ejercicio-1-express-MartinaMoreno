<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saludo Personalizado</title>
    <link rel="stylesheet" href="/styles/saludo.css">
</head>
<body>
    <h1>Recibe un Saludo Personalizado</h1>
    <p>Ingresa tu nombre y obtén un saludo único.</p>
    <form id="saludo-form">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>
        <button type="submit">Enviar</button>
    </form>

    <div id="respuesta" style="display: none; margin-top: 20px; padding: 10px; background: #d4edda; border: 1px solid #c3e6cb; border-radius: 4px;"></div>

    <nav>
        <a href="/">Inicio</a> |
        <a href="/acerca">Acerca de</a> |
        <a href="/contacto">Contacto</a> |
        <a href="/encuesta">Encuesta</a> |
        <a href="/mensajes">Mensajes</a> |
        <a href="/productos">Productos</a> |
        <a href="/frases">Frases</a>
    </nav>

    <script>
        // Función para enviar el formulario con fetch
        async function enviarSaludo(event) {
            event.preventDefault(); // Evita el envío normal

            const nombre = document.getElementById('nombre').value;

            try {
                const response = await fetch('/api/saludo', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nombre })
                });

                if (!response.ok) {
                    throw new Error('Error en la respuesta del servidor');
                }

                const data = await response.json();
                mostrarRespuesta(data.saludo);
            } catch (error) {
                mostrarRespuesta('Error: ' + error.message);
            }
        }

        // Función para mostrar la respuesta
        function mostrarRespuesta(saludo) {
            const respuestaDiv = document.getElementById('respuesta');
            respuestaDiv.textContent = saludo;
            respuestaDiv.style.display = 'block';
            // Limpiar el formulario
            document.getElementById('saludo-form').reset();
        }

        // Asignar evento al formulario
        document.getElementById('saludo-form').addEventListener('submit', enviarSaludo);
    </script>
</body>
</html>
